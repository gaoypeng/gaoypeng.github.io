<?xml version="1.0" encoding="UTF-8"?>
<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3a6fb0"/>
      <stop offset="1" stop-color="#5e3fae"/>
    </linearGradient>
  </defs>
  <rect x="2" y="2" width="60" height="60" rx="14" fill="url(#g)"/>
  <!-- articulated object motif: a base link and a hinged child link rotating about a pivot -->
  <rect x="13" y="34" width="20" height="16" rx="2.5" fill="#ffffff" opacity="0.95"/>
  <rect x="30" y="16" width="20" height="14" rx="2.5" fill="#ffffff" opacity="0.78"
        transform="rotate(20 31 30)"/>
  <!-- pivot joint -->
  <circle cx="31" cy="34" r="4" fill="#ffd24a"/>
  <circle cx="31" cy="34" r="1.6" fill="#3a6fb0"/>
</svg>
